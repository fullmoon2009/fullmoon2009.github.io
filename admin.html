<!DOCTYPE html>
<html lang="">

<head>
    <meta charset="utf-8">
    <title>Example Title</title>
    <meta name="author" content="Your Name">
    <meta name="description" content="Example description">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="grid.css">
    <link rel="icon" type="image/x-icon" href="" />
</head>

<body>


    <div class="sidebar-box pt-4">
        <i class="sidebar-icon fa-solid fa-house pe-2 me-2">
            <p class="sidebar-text">Home</p>
        </i>
        <i class="sidebar-icon fa-solid fa-headphones-simple mt-4" style="margin-right: 18px">
            <p class="sidebar-text ">Service</p>
        </i>
        <i class="sidebar-icon fa-solid fa-flag mt-4" style="margin-right: 19px">
            <p class="sidebar-text ">Alerts</p>
        </i>
        <i class="sidebar-icon fa-solid fa-chart-pie mt-4 pe-2" style="margin-right: 10px">
            <p class="sidebar-text ">Stats</p>
        </i>
    </div>




    <div class="main-content-box" style="background: whitesmoke">
        <div class="row navbar-box" style="border-bottom: 3px solid lightgrey">
            <div class="col-7">
                <nav class="navbar navbar-light">
                    <div class="container-fluid ps-1">
                        <form class="d-flex">
                            <input class="nav-input form-control" type="search" placeholder="Search" aria-label="Search" style="border-radius: 5px 0px 0px 5px;">
                            <button class="btn btn-outline-success me-" type="submit" style="color: white; background: black; border-radius: 0px 5px 5px 0px;">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                        </form>
                    </div>
                </nav>
            </div>

            <div class="col-5 pt-3" style="text-align: end; color: grey">
                <i class="fa-solid fa-bell pe-4"></i>
                <i class="fa-solid fa-message pe-3"></i>
                <p class="pe-2" style="display: inline-block">John Doe</p>
            </div>
        </div>

        <div style="height: 50px; margin-bottom: 20px">
            <h1 class="pt-3" style="margin-left: 65px; font-size: 25px; font-weight: 600">Dashboard</h1>
        </div>






        <div class="dashboard-box row">
            <div class="col-md-12 col-lg-3">
                <div class="card">
                    <div class="card-body d-flex justify-content-between card-edge" style="box-shadow: inset 4px -0 skyblue;">
                        <div>
                            <p class="card-text mb-2">Earnings (Monthly)</p>
                            <h4>$400,000</h4>
                        </div>
                        <i class="fas fa-calendar" style="font-size: 30px; margin-top: 20px; color: grey"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-12 col-lg-3">
                <div class="card">
                    <div class="card-body d-flex justify-content-between card-edge" style="box-shadow: inset 4px -0 green;">
                        <div>
                            <p class="card-text mb-2">Earnings (Annual)</p>
                            <h4>$800,000</h4>
                        </div>
                        <i class="fa-solid fa-dollar-sign" style="font-size: 30px; margin-top: 20px; color: grey"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-12 col-lg-3">
                <div class="card">
                    <div class="card-body d-flex justify-content-between card-edge" style="box-shadow: inset 4px -0 blue;">
                        <div>
                            <p class="card-text mb-2">Tasks</p>
                            <h4>13</h4>
                        </div>
                        <i class="fa-solid fa-list-check" style="font-size: 30px; margin-top: 20px; color: grey"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-12 col-lg-3">
                <div class="card">
                    <div class="card-body d-flex justify-content-between card-edge" style="box-shadow: inset 4px -0 gold;">
                        <div>
                            <p class="card-text mb-2">Requests</p>
                            <h4>26</h4>
                        </div>
                        <i class="fa-solid fa-comments" style="font-size: 30px; margin-top: 20px; color: grey"></i>
                    </div>
                </div>
            </div>
        </div>






        <div class="content-box row pt-4 mt-3">
            <div class="col-md-12 col-lg-8">
                <div class="card">
                    <div class="card-header" style="font-weight: bold;">
                        Earnings
                    </div>
                    <div class="card-body">
                        <canvas id="myChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-12 col-lg-4">
                <div class="card">
                    <div class="card-header" style="font-weight: bold">
                        Tasks
                    </div>
                    <ul class="list-group list-group-flush">
                        <li class="item-li list-group-item">
                            <p class="list-text">Borrowed item</p>
                            <div class="pill-large">14</div>
                        </li>
                        <li class="item-li list-group-item">
                            <p class="list-text">Trelio requests</p>
                            <div class="pill-sm">2</div>
                        </li>
                        <li class="item-li list-group-item">
                            <p class="list-text">Marked Comments</p>
                            <div class="pill-sm">1</div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

    </div>







    <header></header>
    <main></main>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="text/javascript" src=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var gradient = ctx.createLinearGradient(0, 0, 0, 800);
        gradient.addColorStop(0, 'rgba(135, 206, 235, 0.5)');
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        var myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'July'],
                datasets: [{
                    label: 'Monthly',
                    data: [12, 19, 3, 5, 2, 3, 7],
                    backgroundColor: gradient,
                    borderColor: 'steelblue',
                    borderWidth: 4,
                    tension: 0.4
                }]
            },
            options: {
                scales: {
                    x: {
                        grid: {
                            display: false
                        }
                    },
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body></html>
